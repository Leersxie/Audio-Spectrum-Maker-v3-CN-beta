<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波形生成器 v3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS Custom Properties (Theme) ===== */
        :root {
            --accent: #C90031;
            --accent-light: #ff1a4f;
            --accent-glow: rgba(201, 0, 49, 0.35);

            /* Rainbow gradient */
            --rainbow: linear-gradient(135deg,
                    rgba(255, 0, 80, 0.15),
                    rgba(255, 120, 0, 0.12),
                    rgba(255, 220, 0, 0.10),
                    rgba(0, 220, 130, 0.12),
                    rgba(0, 140, 255, 0.15),
                    rgba(130, 0, 255, 0.12),
                    rgba(255, 0, 160, 0.15));
        }

        /* --- Dark theme (default) --- */
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --border-card: rgba(255, 255, 255, 0.08);
            --border-input: rgba(255, 255, 255, 0.12);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --canvas-bg: #1a2236;
            --drop-zone-bg: rgba(201, 0, 49, 0.06);
            --drop-zone-border: rgba(201, 0, 49, 0.3);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
            --progress-bg: #334155;
        }

        /* --- Light theme --- */
        [data-theme="light"] {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --border-card: rgba(0, 0, 0, 0.08);
            --border-input: rgba(0, 0, 0, 0.12);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --canvas-bg: #e2e8f0;
            --drop-zone-bg: rgba(201, 0, 49, 0.04);
            --drop-zone-border: rgba(201, 0, 49, 0.25);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --progress-bg: #e2e8f0;
            /* Pale rainbow for light mode */
            --rainbow: linear-gradient(135deg,
                    rgba(255, 150, 180, 0.25),
                    rgba(255, 200, 150, 0.25),
                    rgba(255, 240, 150, 0.25),
                    rgba(150, 240, 200, 0.25),
                    rgba(150, 200, 255, 0.25),
                    rgba(200, 150, 255, 0.25),
                    rgba(255, 150, 220, 0.25));
        }

        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* ===== Layout ===== */
        .app {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .app-body {
            display: flex;
            flex-direction: row;
            gap: 1.25rem;
            align-items: flex-start;
        }

        .left-column {
            flex: 2;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .right-column {
            flex: 3;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: sticky;
            top: 1.5rem;
        }

        @media (max-width: 768px) {
            .app-body {
                flex-direction: column;
            }
            .right-column {
                position: static;
            }
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 999px;
            width: 44px;
            height: 26px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .theme-toggle::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            transition: transform 0.3s;
        }

        [data-theme="light"] .theme-toggle::after {
            transform: translateX(18px);
        }

        .theme-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ===== Card ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
        }

        /* Rainbow glow overlay on cards */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--rainbow);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }

        .card>* {
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }

        /* ===== Drop Zone ===== */
        .drop-zone {
            border: 2px dashed var(--drop-zone-border);
            border-radius: 0.75rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            background: var(--drop-zone-bg);
            transition: border-color 0.3s, background 0.3s, transform 0.15s;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(201, 0, 49, 0.1);
            transform: scale(1.01);
        }

        .drop-zone-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .drop-zone-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .drop-zone-text strong {
            color: var(--accent);
        }

        .file-name {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--accent-light);
            word-break: break-all;
        }

        input[type="file"] {
            display: none;
        }

        /* ===== Settings Grid ===== */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        @media (max-width: 480px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .setting-item label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .setting-item input[type="number"],
        .setting-item select {
            width: 100%;
            padding: 0.5rem 0.6rem;
            border-radius: 0.5rem;
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .setting-item input[type="number"]:focus,
        .setting-item select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .setting-item input[type="color"] {
            width: 100%;
            height: 38px;
            padding: 2px;
            border-radius: 0.5rem;
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            cursor: pointer;
        }

        /* ===== Format Radio ===== */
        .format-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .format-option {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .format-option input[type="radio"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        /* ===== Generate Button ===== */
        .btn-generate {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s, opacity 0.25s;
            box-shadow: 0 4px 16px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-generate:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Rainbow shimmer on button */
        .btn-generate::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            right: 0;
            bottom: 0;
            width: 300%;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.15) 25%,
                    rgba(255, 255, 255, 0.3) 50%,
                    rgba(255, 255, 255, 0.15) 75%,
                    transparent 100%);
            animation: shimmer 3s infinite linear;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-33%);
            }

            100% {
                transform: translateX(33%);
            }
        }

        /* ===== Cancel Button ===== */
        .btn-cancel {
            width: 100%;
            padding: 0.65rem;
            border: 2px solid var(--accent);
            border-radius: 0.75rem;
            background: transparent;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            display: none;
        }

        .btn-cancel:hover {
            background: rgba(201, 0, 49, 0.12);
            transform: translateY(-1px);
        }

        .btn-cancel.visible {
            display: block;
        }

        /* ===== Frame Warning Banner ===== */
        .frame-warning {
            display: none;
            background: rgba(234, 179, 8, 0.15);
            border: 1px solid rgba(234, 179, 8, 0.5);
            border-radius: 0.6rem;
            padding: 0.6rem 0.85rem;
            font-size: 0.8rem;
            color: #ca8a04;
            line-height: 1.5;
        }

        [data-theme="dark"] .frame-warning {
            color: #fde047;
            background: rgba(234, 179, 8, 0.12);
        }

        .frame-warning.visible {
            display: block;
        }

        /* ===== Progress ===== */
        .progress-area {
            display: none;
        }

        .progress-area.active {
            display: block;
        }

        .progress-bar-track {
            width: 100%;
            height: 8px;
            background: var(--progress-bg);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 999px;
            transition: width 0.15s ease;
            position: relative;
        }

        .progress-bar-fill::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent);
            animation: progressShimmer 1.5s infinite;
        }

        @keyframes progressShimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.4rem;
            text-align: center;
        }

        /* ===== Canvas ===== */
        .preview-canvas {
            width: 100%;
            height: 220px;
            background: var(--canvas-bg);
            border-radius: 0.75rem;
            display: block;
            transition: background 0.4s;
        }

        /* ===== Status ===== */
        .status-msg {
            font-size: 0.82rem;
            text-align: center;
            color: var(--text-secondary);
            min-height: 1.2em;
        }

        .status-msg.success {
            color: #22c55e;
        }

        .status-msg.error {
            color: #ef4444;
        }

        /* ===== Scratch Preview ===== */
        .scratch-preview-iframe {
            width: 100%;
            aspect-ratio: 4 / 3;
            border: none;
            border-radius: 0.75rem;
            background: #000;
            display: block;
        }

        .scratch-preview-placeholder {
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 0.75rem;
            background: var(--canvas-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* ===== Collapsible Settings ===== */
        .settings-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0;
            transition: color 0.2s;
        }

        .settings-toggle:hover {
            color: var(--accent);
        }

        .settings-toggle .arrow {
            display: inline-block;
            transition: transform 0.3s;
            font-size: 0.7rem;
        }

        .settings-toggle.open .arrow {
            transform: rotate(90deg);
        }

        .settings-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .settings-body.open {
            max-height: 800px;
        }
    </style>
</head>

<body data-theme="dark">

    <div class="app">
        <!-- Header -->
        <div class="header">
            <h1>波形生成器 v3</h1>
            <div class="theme-label">
                <span id="themeText">🌙</span>
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题"></button>
            </div>
        </div>

        <!-- 主体：两栏布局 -->
        <div class="app-body">
            <!-- 左栏: 设置与输出 -->
            <div class="left-column">
                <!-- 文件选择 -->
                <div class="card">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone-icon">🎵</div>
                        <div class="drop-zone-text">
                            将音频文件<strong>拖放到此处</strong><br>
                            或点击以选择
                        </div>
                        <div class="file-name" id="fileName"></div>
                    </div>
                    <input type="file" id="audioFile"
                        accept="audio/mpeg, audio/wav, audio/ogg, audio/flac, audio/aac, .mp3, .wav, .ogg, .flac, .aac, .m4a, .opus, .aiff">
                </div>

                <!-- 详细设置 (默认展开) -->
                <div class="card">
                    <button class="settings-toggle open" id="settingsToggle">
                        <span class="arrow">▶</span> 详细设置
                    </button>
                    <div class="settings-body open" id="settingsBody">
                        <div style="height:0.75rem"></div>
                        <div class="settings-grid">
                            <div class="setting-item">
                                <label for="minFreq">最低频率 (Hz)</label>
                                <input type="number" id="minFreq" value="20" min="1" step="1">
                            </div>
                            <div class="setting-item">
                                <label for="maxFreq">最高频率 (Hz)</label>
                                <input type="number" id="maxFreq" value="24000" min="1" step="1">
                            </div>
                            <div class="setting-item">
                                <label for="numBars">条数</label>
                                <input type="number" id="numBars" value="480" min="1" step="1">
                            </div>
                            <div class="setting-item">
                                <label for="barThickness">柱宽</label>
                                <input type="number" id="barThickness" value="5" min="1" step="1">
                            </div>
                            <div class="setting-item">
                                <label for="barHeightScale">高度缩放</label>
                                <input type="number" id="barHeightScale" value="0.5" min="0" step="0.1">
                            </div>
                            <div class="setting-item">
                                <label for="attack">攻击 (Attack)</label>
                                <input type="number" id="attack" value="0.6" min="0" max="1" step="0.01">
                            </div>
                            <div class="setting-item">
                                <label for="decay">衰减 (Decay)</label>
                                <input type="number" id="decay" value="0.6" min="0" max="1" step="0.01">
                            </div>
                            <div class="setting-item">
                                <label for="peakBrightness">峰值亮度</label>
                                <input type="number" id="peakBrightness" value="1.0" min="0" step="0.1">
                            </div>
                            <div class="setting-item">
                                <label for="smoothCurve">平滑曲线</label>
                                <input type="number" id="smoothCurve" value="2.5" min="0" step="0.1">
                            </div>
                            <div class="setting-item">
                                <label for="freqCompensation">频率补偿 (0-2)</label>
                                <input type="number" id="freqCompensation" value="2" min="0" max="2" step="0.1">
                            </div>
                            <div class="setting-item">
                                <label for="fps">FPS</label>
                                <input type="number" id="fps" value="60" min="1" step="1">
                            </div>
                            <div class="setting-item">
                                <label for="samplingInterval">采样间隔 (1/n)</label>
                                <input type="number" id="samplingInterval" value="2" min="1" step="1">
                            </div>
                            <div class="setting-item">
                                <label for="barColor">柱颜色</label>
                                <input type="color" id="barColor" value="#ff3165">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 记录格式 (.sb3 为默认) -->
                <div class="card">
                    <div class="card-title">记录格式</div>
                    <div class="format-group">
                        <label class="format-option">
                            <input type="radio" name="format" value="waveform">
                            波形数据 (.txt)
                        </label>
                        <label class="format-option">
                            <input type="radio" name="format" value="sb3" checked>
                            .sb3 (Scratch)
                        </label>
                    </div>
                </div>

                <!-- 帧数警告 -->
                <div class="frame-warning" id="frameWarning">
                    ⚠️ <strong>帧数过多警告：</strong>预计 <span id="frameWarningCount"></span> 帧，可能导致 Scratch 列表超限（上限约 18000 帧）。建议降低 FPS 或裁剪音频。
                </div>

                <!-- 生成按钮 -->
                <button class="btn-generate" id="btnGenerate" disabled>生成波形</button>

                <!-- 取消按钮 -->
                <button class="btn-cancel" id="btnCancel">⏹ 取消生成</button>

                <!-- 进度 -->
                <div class="card progress-area" id="progressArea">
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">准备中…</div>
                </div>

                <!-- 状态 -->
                <div class="status-msg" id="statusMsg"></div>
            </div>

            <!-- 右栏: 预览 -->
            <div class="right-column">
                <!-- 波形预览 -->
                <div class="card">
                    <div class="card-title">波形预览</div>
                    <canvas class="preview-canvas" id="previewCanvas"></canvas>
                    <audio id="previewAudio" controls style="width: 100%; margin-top: 1rem; display: none; outline: none; border-radius: 999px;"></audio>
                </div>

                <!-- Scratch 预览 (常显) -->
                <div class="card" id="scratchPreviewCard">
                    <div class="card-title">Scratch 预览</div>
                    <div class="scratch-preview-placeholder" id="scratchPlaceholder">
                        尚未输出
                    </div>
                    <iframe id="scratchPreview" src="./player.html" class="scratch-preview-iframe" style="display:none;"
                        allowfullscreen allow="autoplay">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== Theme Toggle =====
        const themeToggle = document.getElementById('themeToggle');
        const themeText = document.getElementById('themeText');
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeText.textContent = isDark ? '☀️' : '🌙';
        });

        // ===== Settings Toggle =====
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsBody = document.getElementById('settingsBody');
        settingsToggle.addEventListener('click', () => {
            settingsToggle.classList.toggle('open');
            settingsBody.classList.toggle('open');
        });

        // ===== File Selection =====
        const dropZone = document.getElementById('dropZone');
        const audioFileInput = document.getElementById('audioFile');
        const fileNameEl = document.getElementById('fileName');
        const btnGenerate = document.getElementById('btnGenerate');
        let selectedFile = null;

        dropZone.addEventListener('click', () => audioFileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        audioFileInput.addEventListener('change', e => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            selectedFile = file;
            fileNameEl.textContent = file.name;
            btnGenerate.disabled = false;
            setStatus('');
            
            // 将音源设置到音频播放器
            const previewAudio = document.getElementById('previewAudio');
            if (previewAudio.src) {
                URL.revokeObjectURL(previewAudio.src);
            }
            previewAudio.src = URL.createObjectURL(file);
            previewAudio.style.display = 'none'; // 生成完成后再显示
            globalRawFrames = []; // 清除
        }

        // ===== Status =====
        const statusMsg = document.getElementById('statusMsg');
        function setStatus(msg, type = '') {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg' + (type ? ' ' + type : '');
        }

        // ===== Gather Settings =====
        function getSettings() {
            return {
                minFreq: Math.max(1, parseFloat(document.getElementById('minFreq').value) || 20),
                maxFreq: Math.max(1, parseFloat(document.getElementById('maxFreq').value) || 24000),
                numBars: Math.max(1, parseInt(document.getElementById('numBars').value) || 480),
                barThickness: Math.max(1, parseInt(document.getElementById('barThickness').value) || 5),
                barHeightScale: parseFloat(document.getElementById('barHeightScale').value) || 0.5,
                attack: parseFloat(document.getElementById('attack').value) || 0.6,
                decay: parseFloat(document.getElementById('decay').value) || 0.6,
                peakBrightness: parseFloat(document.getElementById('peakBrightness').value) || 1.0,
                smoothCurve: parseFloat(document.getElementById('smoothCurve').value) || 2.5,
                freqCompensation: parseFloat(document.getElementById('freqCompensation').value) || 2,
                fps: Math.max(1, parseInt(document.getElementById('fps').value) || 60),
                samplingInterval: Math.max(1, parseInt(document.getElementById('samplingInterval').value) || 2),
                barColor: document.getElementById('barColor').value
            };
        }

        // ===== Hex to HSL =====
        function hexToHsl(hex) {
            let r = parseInt(hex.substring(1, 3), 16) / 255;
            let g = parseInt(hex.substring(3, 5), 16) / 255;
            let b = parseInt(hex.substring(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }

        // ===== 编码用查找表（预生成） =====
        const ENCODE_LOOKUP = (() => {
            const table = new Array(53);
            table[0] = '"'; table[1] = '#'; table[2] = '$';
            table[3] = '%'; table[4] = '&'; table[5] = "'";
            table[6] = '('; table[7] = ')'; table[8] = '=';
            table[9] = '^'; table[10] = '!';
            for (let i = 11; i <= 36; i++) table[i] = String.fromCharCode(96 + i - 10);
            for (let i = 37; i <= 52; i++) table[i] = String.fromCharCode(64 + i - 36);
            return table;
        })();

        // ===== 将帧编码为数值索引数组 =====
        function encodeFrameNumeric(barHeights, interval) {
            const count = Math.ceil(barHeights.length / interval);
            const indices = new Uint8Array(count);
            let idx = 0;
            for (let i = 0; i < barHeights.length; i += interval) {
                indices[idx++] = Math.min(Math.round(Math.floor(Math.min(barHeights[i], 315) / 2) / 3), 52);
            }
            return indices;
        }

        // ===== 将数值数组转换为字符串 =====
        function numericToString(indices) {
            const chars = new Array(indices.length);
            for (let i = 0; i < indices.length; i++) {
                chars[i] = ENCODE_LOOKUP[indices[i]];
            }
            const line = chars.join('');
                // 全静音帧 → 空字符串
            return /^"+$/.test(line.trim()) ? '' : line;
        }

        // ===== 兼容: 旧版 encodeFrame（内部使用查找表） =====
        function encodeFrame(barHeights, interval) {
            return numericToString(encodeFrameNumeric(barHeights, interval));
        }

        // ===== Draw Preview =====
        const previewCanvas = document.getElementById('previewCanvas');
        let globalRawFrames = [];
        let globalSettings = null;

        function drawPreview(barHeights, settings) {
            if (!barHeights) return;
            const canvas = previewCanvas;
            canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
            canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
            const ctx = canvas.getContext('2d');
            ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;

            ctx.clearRect(0, 0, w, h);

            const numBars = barHeights.length;
            const spacing = w / numBars;
            const thickness = Math.max(1, Math.min(settings.barThickness, spacing));
            const hsl = hexToHsl(settings.barColor);
            const hue = hsl[0];

            for (let i = 0; i < numBars; i++) {
                const barH = Math.min(barHeights[i] * settings.barHeightScale, h);
                const x = i * spacing + (spacing - thickness) / 2;
                const normalizedH = barH / h;
                const midL = 50;
                const minL = Math.max(0, midL * (1 - settings.peakBrightness / 2));
                const lightness = Math.max(0, Math.min(100, minL + (midL - minL) * normalizedH));
                ctx.fillStyle = `hsl(${hue}, 100%, ${lightness}%)`;
                ctx.fillRect(x, h - barH, thickness, barH);
            }
        }

        // ===== 预览音频的同步处理 =====
        const previewAudio = document.getElementById('previewAudio');
        function updatePreviewFromAudio() {
            if (!globalRawFrames || globalRawFrames.length === 0 || !globalSettings) return;
            const time = previewAudio.currentTime;
            const frame = Math.floor(time * globalSettings.fps);
            if (frame >= 0 && frame < globalRawFrames.length) {
                drawPreview(globalRawFrames[frame], globalSettings);
            }
        }

        function rafLoop() {
            if (!previewAudio.paused) {
                updatePreviewFromAudio();
                requestAnimationFrame(rafLoop);
            }
        }

        previewAudio.addEventListener('play', () => {
            requestAnimationFrame(rafLoop);
        });
        previewAudio.addEventListener('timeupdate', () => {
            if (previewAudio.paused) updatePreviewFromAudio(); // 用于定位/跳转时的更新
        });
        previewAudio.addEventListener('seeked', updatePreviewFromAudio);

        // ===== 取消生成控制器 =====
        let cancelController = null;

        // ===== Offline FFT Processing (Cross-device consistent) =====
        async function generateWaveform() {
            const settings = getSettings();
            const format = document.querySelector('input[name="format"]:checked').value;

            btnGenerate.disabled = true;
            btnCancel.classList.add('visible');
            const progressArea = document.getElementById('progressArea');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progressArea.classList.add('active');
            progressFill.style.width = '0%';
            progressText.textContent = '解码中…';
            setStatus('');

            // 创建取消令牌
            cancelController = { cancelled: false };
            const currentCancel = cancelController;

            try {
                // 1. Read file as ArrayBuffer
                const arrayBuffer = await selectedFile.arrayBuffer();
                if (currentCancel.cancelled) throw new DOMException('已取消', 'AbortError');

                // 2. Decode audio - use a standard sample rate for cross-device consistency
                const STANDARD_SAMPLE_RATE = 44100;
                const tempCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: STANDARD_SAMPLE_RATE });
                const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer.slice(0));
                await tempCtx.close();

                const sampleRate = STANDARD_SAMPLE_RATE;
                const duration = audioBuffer.duration;
                const totalFrames = Math.ceil(duration * settings.fps);
                const frameDuration = 1 / settings.fps;

                // ===== 帧数上限警告 =====
                const FRAME_WARN_THRESHOLD = 18000;
                if (totalFrames > FRAME_WARN_THRESHOLD) {
                    const proceed = confirm(
                        `⚠️ 帧数过多警告\n\n` +
                        `预计生成 ${totalFrames.toLocaleString()} 帧（${duration.toFixed(1)}秒 × ${settings.fps}fps）。\n\n` +
                        `Scratch 列表上限约 18,000 帧，超出可能导致崩溃或无法加载。\n\n` +
                        `建议：\n• 降低 FPS（当前 ${settings.fps}，推荐 ≤${Math.floor(18000 / duration)} fps）\n• 裁剪音频至 ${Math.floor(18000 / settings.fps)} 秒以内\n\n` +
                        `是否仍要继续生成？`
                    );
                    if (!proceed) {
                        setStatus('⚠️ 已取消：帧数超限', 'error');
                        progressText.textContent = '已取消';
                        progressFill.style.width = '0%';
                        return;
                    }
                }

                progressText.textContent = `处理中… 0/${totalFrames} 帧`;

                // 3. Resample to standard rate to ensure cross-device consistency
                const totalSamples = Math.ceil(duration * sampleRate);
                const resampleCtx = new OfflineAudioContext(1, totalSamples, sampleRate);
                const resampleSource = resampleCtx.createBufferSource();
                resampleSource.buffer = audioBuffer;
                resampleSource.connect(resampleCtx.destination);
                resampleSource.start(0);
                const resampledBuffer = await resampleCtx.startRendering();
                const resampledData = resampledBuffer.getChannelData(0);
                if (currentCancel.cancelled) throw new DOMException('已取消', 'AbortError');

                // 4. Process each frame using manual FFT (consistent across devices)
                const fftSize = 8192;
                // ===== 优化: 平滑点数上限控制，避免 numBars*4 过大 =====
                const smoothingPoints = Math.min(2048, settings.numBars * 2);
                let smoothedData = new Float64Array(smoothingPoints);
                let smoothedInitialized = false;

                // 将帧数据存入预分配数组
                const recordedNumeric = new Array(totalFrames);
                globalRawFrames = new Array(totalFrames);
                let frameIdx = 0;
                let lastBarHeights = null;

                const logMinFreq = Math.log(settings.minFreq);
                const logMaxFreq = Math.log(settings.maxFreq);
                const logRange = logMaxFreq - logMinFreq;
                const halfFFT = fftSize / 2;

                // Hann window (precomputed once)
                const hannWindow = new Float64Array(fftSize);
                for (let i = 0; i < fftSize; i++) {
                    hannWindow[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / (fftSize - 1)));
                }

                // ===== 优化: 预计算对数频率插值索引（每帧都相同，只算一次）=====
                const interpFloor = new Int32Array(smoothingPoints);
                const interpCeil = new Int32Array(smoothingPoints);
                const interpFrac = new Float64Array(smoothingPoints);
                for (let i = 0; i < smoothingPoints; i++) {
                    const logRatio = i / (smoothingPoints - 1);
                    const virtualFreq = Math.exp(logMinFreq + logRatio * logRange);
                    const idxFloat = virtualFreq * fftSize / sampleRate;
                    interpFloor[i] = Math.floor(idxFloat);
                    interpCeil[i] = Math.ceil(idxFloat);
                    interpFrac[i] = idxFloat - interpFloor[i];
                }

                // ===== 优化: 预计算移动平均累积和所需窗口大小 =====
                const smoothWindowSize = settings.smoothCurve > 0
                    ? Math.max(1, Math.min(Math.round(settings.smoothCurve * 10), Math.floor(smoothingPoints / 4)))
                    : 0;
                const halfWin = Math.floor(smoothWindowSize / 2);
                const smoothBlend = settings.smoothCurve > 0 ? Math.min(1, settings.smoothCurve / 3) : 0;

                // ===== 重用缓冲区（减少每帧 GC 压力）=====
                const windowedSamples = new Float64Array(fftSize);
                const currentInterpolated = new Float64Array(smoothingPoints);
                const tempSmooth = new Float64Array(smoothingPoints);
                // 前缀和数组，用于 O(N) 滑动平均
                const prefixSum = new Float64Array(smoothingPoints + 1);

                // Process frames in chunks to keep UI responsive
                const CHUNK_SIZE = 50;
                for (let frameStart = 0; frameStart < totalFrames; frameStart += CHUNK_SIZE) {
                    // ===== 检查取消信号 =====
                    if (currentCancel.cancelled) throw new DOMException('已取消', 'AbortError');

                    const frameEnd = Math.min(frameStart + CHUNK_SIZE, totalFrames);

                    for (let frame = frameStart; frame < frameEnd; frame++) {
                        const time = frame * frameDuration;
                        const centerSample = Math.floor(time * sampleRate);

                        // Extract windowed samples（复用缓冲区）
                        const startSample = centerSample - (fftSize >> 1);
                        for (let i = 0; i < fftSize; i++) {
                            const idx = startSample + i;
                            windowedSamples[i] = (idx >= 0 && idx < resampledData.length)
                                ? resampledData[idx] * hannWindow[i]
                                : 0;
                        }

                        // FFT (Cooley-Tukey radix-2)
                        const { real, imag } = fft(windowedSamples);

                        // Compute magnitude spectrum
                        const minDb = -100, maxDb = -30, dbRange = maxDb - minDb;
                        for (let i = 0; i < smoothingPoints; i++) {
                            const fi = interpFloor[i], ci = interpCeil[i];
                            let mag;
                            if (fi < 0 || ci >= halfFFT) {
                                currentInterpolated[i] = 0;
                                continue;
                            }
                            if (fi === ci) {
                                mag = Math.sqrt(real[fi] * real[fi] + imag[fi] * imag[fi]) / halfFFT;
                            } else {
                                const frac = interpFrac[i];
                                const magF = Math.sqrt(real[fi] * real[fi] + imag[fi] * imag[fi]) / halfFFT;
                                const magC = Math.sqrt(real[ci] * real[ci] + imag[ci] * imag[ci]) / halfFFT;
                                mag = magF * (1 - frac) + magC * frac;
                            }
                            const db = 20 * Math.log10(Math.max(mag, 1e-10));
                            currentInterpolated[i] = Math.max(0, Math.min(255, ((db - minDb) / dbRange) * 255));
                        }

                        // Attack/Decay smoothing
                        if (!smoothedInitialized) {
                            smoothedData.set(currentInterpolated);
                            smoothedInitialized = true;
                        } else {
                            for (let i = 0; i < smoothingPoints; i++) {
                                const target = currentInterpolated[i];
                                const current = smoothedData[i];
                                smoothedData[i] = target > current
                                    ? current * settings.attack + target * (1 - settings.attack)
                                    : current * settings.decay + target * (1 - settings.decay);
                            }
                        }

                        // ===== 优化: O(N) 前缀和滑动平均（替代原来的 O(N²) 双重循环）=====
                        if (smoothWindowSize > 0 && smoothBlend > 0) {
                            // 构建前缀和
                            prefixSum[0] = 0;
                            for (let i = 0; i < smoothingPoints; i++) {
                                prefixSum[i + 1] = prefixSum[i] + smoothedData[i];
                            }
                            // 滑动窗口均值
                            for (let i = 0; i < smoothingPoints; i++) {
                                const lo = Math.max(0, i - halfWin);
                                const hi = Math.min(smoothingPoints - 1, i + halfWin);
                                tempSmooth[i] = (prefixSum[hi + 1] - prefixSum[lo]) / (hi - lo + 1);
                            }
                            const inv = 1 - smoothBlend;
                            for (let i = 0; i < smoothingPoints; i++) {
                                smoothedData[i] = smoothedData[i] * inv + tempSmooth[i] * smoothBlend;
                            }
                        }

                        // Calculate bar heights
                        const barHeights = new Float64Array(settings.numBars);
                        for (let i = 0; i < settings.numBars; i++) {
                            const spStart = Math.floor((i / settings.numBars) * smoothingPoints);
                            const spEnd = Math.ceil(((i + 1) / settings.numBars) * smoothingPoints);
                            let sum = 0, count = 0;
                            for (let j = spStart; j < spEnd; j++) {
                                if (j >= 0 && j < smoothingPoints) { sum += smoothedData[j]; count++; }
                            }
                            let bh = count > 0 ? (sum / count) * settings.barHeightScale : 0;
                            if (settings.freqCompensation > 0) {
                                const pos = i / (settings.numBars - 1);
                                bh *= 1 + (pos * settings.freqCompensation);
                            }
                            barHeights[i] = bh;
                        }

                        lastBarHeights = Array.from(barHeights);
                        globalRawFrames[frameIdx] = lastBarHeights;
                        const intHeights = new Float64Array(barHeights.length);
                        for (let k = 0; k < barHeights.length; k++) intHeights[k] = Math.floor(barHeights[k]);
                        recordedNumeric[frameIdx++] = encodeFrameNumeric(intHeights, settings.samplingInterval);
                    }

                    // Update progress
                    const pct = Math.min(100, Math.round((frameEnd / totalFrames) * 100));
                    progressFill.style.width = pct + '%';
                    progressText.textContent = `处理中… ${frameEnd}/${totalFrames} 帧 (${pct}%)`;

                    // Yield to UI
                    await new Promise(r => setTimeout(r, 0));
                }

                // 5. Draw preview of last frame
                if (lastBarHeights) {
                    drawPreview(lastBarHeights, settings);
                }

                progressText.textContent = '编码中…';
                await new Promise(r => setTimeout(r, 0));

                // 6. 将数值数组批量转换为字符串
                const encodedLines = new Array(totalFrames);
                for (let i = 0; i < totalFrames; i++) {
                    encodedLines[i] = numericToString(recordedNumeric[i]);
                }

                // 编码完成后显示播放器并保存设置
                globalSettings = settings;
                previewAudio.style.display = 'block';

                // 7. Save
                if (format === 'waveform') {
                    const header = `?,${settings.numBars},${settings.barThickness},${settings.barHeightScale},${settings.fps},${settings.barColor}`;
                    const output = header + '\n' + encodedLines.join('\n');
                    downloadBlob(new Blob([output], { type: 'text/plain' }), 'spectrum_data.txt');
                    setStatus('✅ 已下载 spectrum_data.txt', 'success');
                } else if (format === 'sb3') {
                    await saveSb3(encodedLines, settings);
                }

                progressFill.style.width = '100%';
                progressText.textContent = '完成！';

            } catch (err) {
                if (err.name === 'AbortError') {
                    setStatus('⏹ 已取消生成', '');
                    progressText.textContent = '已取消';
                    progressFill.style.width = '0%';
                    progressFill.style.transition = 'none';
                    setTimeout(() => progressFill.style.transition = '', 50);
                } else {
                    console.error(err);
                    setStatus('❌ 错误: ' + err.message, 'error');
                    progressText.textContent = '发生错误';
                }
            } finally {
                btnGenerate.disabled = false;
                btnCancel.classList.remove('visible');
                cancelController = null;
            }
        }

        // ===== FFT (Cooley-Tukey radix-2 DIT) =====
        function fft(input) {
            const N = input.length;
            const real = new Float64Array(N);
            const imag = new Float64Array(N);

            // Bit-reversal permutation
            for (let i = 0; i < N; i++) {
                real[bitReverse(i, N)] = input[i];
            }

            // Butterfly computation
            for (let size = 2; size <= N; size *= 2) {
                const halfSize = size / 2;
                const angleStep = -2 * Math.PI / size;
                for (let i = 0; i < N; i += size) {
                    for (let j = 0; j < halfSize; j++) {
                        const angle = angleStep * j;
                        const tpRe = Math.cos(angle) * real[i + j + halfSize] - Math.sin(angle) * imag[i + j + halfSize];
                        const tpIm = Math.cos(angle) * imag[i + j + halfSize] + Math.sin(angle) * real[i + j + halfSize];
                        real[i + j + halfSize] = real[i + j] - tpRe;
                        imag[i + j + halfSize] = imag[i + j] - tpIm;
                        real[i + j] += tpRe;
                        imag[i + j] += tpIm;
                    }
                }
            }
            return { real, imag };
        }

        function bitReverse(x, N) {
            const bits = Math.log2(N);
            let result = 0;
            for (let i = 0; i < bits; i++) {
                result = (result << 1) | (x & 1);
                x >>= 1;
            }
            return result;
        }

        // ===== Download Helper =====
        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ===== SB3 Export =====
        let baseSb3Content = null;
        async function loadBaseSb3() {
            if (baseSb3Content) return true;
            try {
                const response = await fetch('https://raw.githubusercontent.com/Leersxie/AudioSpectrum-CN/main/%E6%A8%A1%E6%9D%BF.sb3');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                baseSb3Content = await response.arrayBuffer();
                return true;
            } catch (err) {
                console.error('Failed to load base sb3:', err);
                return false;
            }
        }

        async function saveSb3(encodedLines, settings) {
            const progressText = document.getElementById('progressText');
            progressText.textContent = '.sb3 模板加载中…';

            if (!await loadBaseSb3()) {
                setStatus('❌ .sb3 模板加载失败', 'error');
                return;
            }

            progressText.textContent = '正在构建 .sb3…';
            await new Promise(r => setTimeout(r, 0));

            const jszipModule = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
            const JSZip = jszipModule.default || jszipModule.JSZip || window.JSZip;

            if (!JSZip || typeof JSZip.loadAsync !== 'function') {
                setStatus('❌ JSZip 加载失败', 'error');
                return;
            }

            const zip = await JSZip.loadAsync(new Blob([baseSb3Content]));
            let projectJsonStr = await zip.file('project.json').async('text');
            projectJsonStr = projectJsonStr.replace(/音源/g, selectedFile.name);
            const projectJson = JSON.parse(projectJsonStr);

            const stageTarget = projectJson.targets.find(t => t.isStage);
            if (!stageTarget) {
                setStatus('❌ 未找到舞台目标', 'error');
                return;
            }

            if (!stageTarget.lists) stageTarget.lists = {};
            let listId = Object.keys(stageTarget.lists).find(k => stageTarget.lists[k][0] === '#スペクトラムデータ');
            if (!listId) {
                listId = crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                    const r = Math.random() * 16 | 0;
                    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
                });
                stageTarget.lists[listId] = ['#スペクトラムデータ', []];
            }

            const header = `?,${settings.numBars},${settings.barThickness},${settings.barHeightScale},${settings.fps},${settings.barColor}`;
            stageTarget.lists[listId][1] = [header, ...encodedLines];

            zip.file('project.json', JSON.stringify(projectJson));
            const audioArrayBuffer = await selectedFile.arrayBuffer();
            zip.file('663a96719183b9aa6e9c010d161487c5.mp3', audioArrayBuffer);

            const sb3ArrayBuffer = await zip.generateAsync({ type: 'arraybuffer' });
            downloadBlob(new Blob([sb3ArrayBuffer]), 'audio_spectrum.sb3');
            setStatus('✅ 已下载 audio_spectrum.sb3', 'success');

            // 发送到 Scratch 预览
            sendToPlayer(sb3ArrayBuffer);
        }

        // ===== Scratch Player =====
        const scratchPreviewCard = document.getElementById('scratchPreviewCard');
        const scratchPreview = document.getElementById('scratchPreview');
        const scratchPlaceholder = document.getElementById('scratchPlaceholder');
        let playerReady = false;
        let pendingSb3 = null;

        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'ready') {
                playerReady = true;
                if (pendingSb3) {
                    scratchPreview.contentWindow.postMessage({ type: 'load', data: pendingSb3 }, '*');
                    pendingSb3 = null;
                }
            }
        });

        function sendToPlayer(arrayBuffer) {
            // Scratch 预览卡持续显示，无需调整 display
            scratchPlaceholder.style.display = 'none';
            scratchPreview.style.display = 'block';
            if (playerReady) {
                scratchPreview.contentWindow.postMessage({ type: 'load', data: arrayBuffer }, '*');
            } else {
                pendingSb3 = arrayBuffer;
            }
        }

        // ===== 取消按钮 =====
        const btnCancel = document.getElementById('btnCancel');
        btnCancel.addEventListener('click', () => {
            if (cancelController) {
                cancelController.cancelled = true;
                btnCancel.disabled = true;
                btnCancel.textContent = '取消中…';
                setTimeout(() => {
                    btnCancel.disabled = false;
                    btnCancel.textContent = '⏹ 取消生成';
                }, 1000);
            }
        });

        // ===== 实时帧数警告（设置变化时更新）=====
        const frameWarning = document.getElementById('frameWarning');
        const frameWarningCount = document.getElementById('frameWarningCount');
        const FRAME_WARN_THRESHOLD = 18000;

        function updateFrameWarning() {
            const fps = Math.max(1, parseInt(document.getElementById('fps').value) || 60);
            const previewAudioEl = document.getElementById('previewAudio');
            // 只有在已选文件且音频已解析时才能估算时长
            if (!selectedFile || !previewAudioEl.duration) {
                frameWarning.classList.remove('visible');
                return;
            }
            const estimatedFrames = Math.ceil(previewAudioEl.duration * fps);
            if (estimatedFrames > FRAME_WARN_THRESHOLD) {
                frameWarningCount.textContent = estimatedFrames.toLocaleString();
                frameWarning.classList.add('visible');
            } else {
                frameWarning.classList.remove('visible');
            }
        }

        document.getElementById('fps').addEventListener('input', updateFrameWarning);
        document.getElementById('previewAudio').addEventListener('loadedmetadata', updateFrameWarning);

        // ===== Button Event =====
        btnGenerate.addEventListener('click', generateWaveform);

        // ===== Canvas Resize =====
        function resizePreviewCanvas() {
            const canvas = previewCanvas;
            canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
            canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
        }
        window.addEventListener('resize', resizePreviewCanvas);
        window.addEventListener('load', resizePreviewCanvas);
    </script>
</body>

</html>
